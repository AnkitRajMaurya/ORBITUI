<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a1a"/>

  <!-- Planet -->
  <defs>
    <radialGradient id="planetGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff512f"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Planet circle -->
  <circle cx="50" cy="55" r="20" fill="url(#planetGrad)"/>

  <!-- Ring -->
  <ellipse cx="50" cy="55" rx="35" ry="10"
           fill="none"
           stroke="url(#ringGrad)"
           stroke-width="6"
           transform="rotate(-20 50 55)"/>

  <!-- Stars -->
  <circle cx="20" cy="20" r="1.5" fill="white"/>
  <circle cx="80" cy="30" r="1" fill="white"/>
  <circle cx="70" cy="15" r="1.2" fill="white"/>
  <circle cx="30" cy="80" r="1" fill="white"/>
</svg>